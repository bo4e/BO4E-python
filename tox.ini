[tox]
requires =
    tox>=4.21
    tox-uv>=1.16
envlist =
    tests
    linting
    coverage
    docs
    type_check
skip_missing_interpreters = True
isolated_build = True

[testenv]
package = editable
# Install from uv.lock instead of re-resolving from pyproject.toml on every
# env-create. Without this, tox-uv's default runner ignores the lock and pulls
# whatever PyPI happens to serve, which defeats the point of committing
# uv.lock.
runner = uv-venv-lock-runner


[testenv:tests]
dependency_groups = tests
commands = python -m pytest --basetemp={envtmpdir} {posargs}


[testenv:linting]
dependency_groups = linting
commands =
    pylint src/bo4e
    pylint generate_or_validate_json_schemas.py

[testenv:type_check]
dependency_groups = type_check
commands =
    mypy --show-error-codes src/bo4e
    mypy --show-error-codes tests
    mypy --show-error-codes generate_or_validate_json_schemas.py
    # add single files (.py) or packages here

[testenv:coverage]
dependency_groups = coverage
commands =
    coverage run -m pytest --basetemp={envtmpdir} {posargs}
    coverage html --omit .tox/*,tests/*,generate_or_validate_json_schemas.py,scripts/*
    coverage report --fail-under 99 --omit .tox/*,tests/*,generate_or_validate_json_schemas.py,scripts/*


[testenv:dev]
dependency_groups = dev
commands =
    pre-commit install


[testenv:docs]
dependency_groups = docs
# any dependency added here should also be added in docs/requirements.in and docs/requirements.txt respectively
setenv =
    TARGET_VERSION = {env:TARGET_VERSION:}
    SPHINX_DOCS_RELEASE = {env:TARGET_VERSION:}
    SPHINX_DOCS_VERSION = {env:TARGET_VERSION:}
# tox 4 strips env vars from subprocess invocations by default. Whitelist the
# GitHub auth tokens so bo4e CLI (called by scripts/generate_docs_assets.py)
# can authenticate against GitHub and stay under the 5000 req/hr limit.
# BO4E_DOCS_* are the script's own overrides; KROKI_URL/KROKI_CONCURRENCY tune
# the kroki rendering step.
pass_env =
    GITHUB_ACCESS_TOKEN
    GITHUB_TOKEN
    BO4E_DOCS_REF
    BO4E_DOCS_LABEL
    KROKI_URL
    KROKI_CONCURRENCY
commands =
    {[testenv:generate_json_schemas]commands}
    python scripts/generate_docs_assets.py
    sphinx-build -T -W -b html -d {envtmpdir}/doctrees docs {envtmpdir}/html
    python -m doctest README.rst


[testenv:bo4e-from-pip]
basepython = python3.10
package = skip
dependency_groups = tests
commands =
    pip install bo4e
    python -m pytest


[testenv:test_packaging]
package = skip
dependency_groups = packaging
commands =
    python -m build
    twine check dist/*

[testenv:generate_json_schemas]
# an environment to generate the json schemas from the bo4e classes
dependency_groups = json_schemas
setenv =
    TARGET_VERSION = {env:TARGET_VERSION:}
# This environment variable will be set inside the release workflow
commands =
    python generate_or_validate_json_schemas.py --mode generate

[testenv:validate_json_schemas]
# an environment to validate that the json schemas are consistent with the python code
dependency_groups = json_schemas
commands =
    python generate_or_validate_json_schemas.py --mode validate
