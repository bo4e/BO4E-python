name: "Test Doc Creation (Sphinx)"
on: [push]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  docbuild:
    name: Check Docs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    env:
      # bo4e CLI only reads GITHUB_ACCESS_TOKEN, not GITHUB_TOKEN. Required so
      # the documentation asset script (bo4e repo versions, bo4e pull) doesn't
      # hit GitHub's 60 req/hr anonymous rate limit.
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # Install a specific version of uv.
          version: "0.11.28"
          enable-cache: true
      - name: Run kroki with docker
        run: |
          docker compose up -d
      - name: Install bo4e CLI
        uses: ./.github/actions/setup-bo4e
      - name: Install dependencies
        run: uv pip install tox tox-uv
      - name: Check Docs
        run: |
          uv run tox -e docs
